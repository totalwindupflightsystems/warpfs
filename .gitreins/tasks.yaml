tasks:
- id: xattr-prefix-idempotency
  title: "Xattr prefix idempotency \u2014 regression guard"
  criteria:
  - full_name('feature') returns 'user.vfs.feature'
  - "full_name('user.vfs.feature') returns 'user.vfs.feature' (idempotent \u2014 no\
    \ doubling)"
  - set_vfs_xattr with prefix, get_vfs_xattr without prefix returns same value
  - 'list_vfs_xattrs after set with prefix returns exactly one attr: ''user.vfs.feature'''
  - At least 10 regression tests in xattr.rs covering set/get roundtrip with mixed
    prefixes
  - 'All regression tests explicitly test the bug case: ''user.vfs.user.vfs.feature''
    MUST NOT appear'
  status: complete
  created_at: '2026-06-24T03:00:00+00:00'
  completed_at: '2026-06-24T05:25:37.433092+00:00'
- id: xattr-fuse-roundtrip
  title: "Xattr through FUSE mount \u2014 end-to-end"
  criteria:
  - warpfs meta --set feature --value foo stores as user.vfs.feature (single prefix)
  - getfattr -n user.vfs.feature <mount/file> returns 'foo'
  - 'warpfs meta <mount/file> returns ''feature: foo'' (was broken with triple-prefix)'
  - warpfs meta --set user.vfs.feature --value bar stores identically (idempotent)
  - getfattr -d <mount/file> lists user.vfs.feature exactly once
  - Untagged files return 'No such attribute' via getfattr, not empty string
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
- id: graph-dedup
  title: "Graph deduplication \u2014 re-discover must not double edges"
  criteria:
  - Running warpfs graph discover twice on same project produces identical edge count
  - append_edges_deduped filters by (from, to, rel) tuple before append
  - DuckDB loaded from edges.jsonl has no duplicate rows after re-discover
  - 'graph stats: total_edges equals unique edge count, no duplicates'
  - Existing unique edges preserved when new edges added (only new ones appended)
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
- id: graph-reverse-queries
  title: "Reverse graph queries \u2014 imported_by, tested_by, tests"
  criteria:
  - warpfs graph related pkg:serde --relation imported_by returns all files importing
    serde
  - warpfs graph related <test_file> --relation tests returns the source file it tests
  - warpfs graph related <source_file> --relation tested_by returns its test files
  - GraphDB::related() accepts direction parameter (forward/reverse) with rel filter
  - 'Cross-language test detection: *_test.go, test_*.py, *.test.ts, *_test.rs, *Test.java
    all mapped'
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
- id: graph-db-path
  title: "DuckDB path consistency \u2014 graph.db vs graph.duckdb"
  criteria:
  - GRAPH_DB_PATH constant used in exactly one place, shared by graph and MCP crates
  - graph discover writes to .vfs/graph/graph.db
  - MCP vfs_graph_stats opens .vfs/graph/graph.db without symlink workaround
  - No manual symlink required after fresh init + discover for MCP tools to work
  - Both graph and MCP crates reference the same constant, not hardcoded strings
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
- id: fuse-readdir
  title: "FUSE readdir \u2014 ls must not hang on any directory"
  criteria:
  - ls <mount>/ returns directory listing under 3 seconds
  - ls <mount>/src/ lists subdirectory contents under 3 seconds
  - Root directory children detected correctly (Path::new('file').parent() = Some('')
    handled)
  - cat <mount>/<file> returns correct file content
  - FUSE daemon starts, serves requests, unmounts cleanly without zombie processes
  - "readdir offset handling works \u2014 '.' and '..' entries returned, children\
    \ follow correctly"
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
- id: fuse-permissions
  title: "FUSE permission enforcement \u2014 manifest-driven mode bits"
  criteria:
  - Permission mode 0444 applied to protected paths (read-only enforcement)
  - Permission mode 0644 applied to workspace files
  - Read attempt on read-only S3 mount returns EACCES
  - FUSE config respects allow_other flag from manifest
  - auto_unmount cleans up on daemon exit
  status: pending
  created_at: '2026-06-24T03:00:00+00:00'
