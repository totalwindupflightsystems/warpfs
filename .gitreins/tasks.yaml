    vfs_graph_impact, vfs_rule_list, vfs_rule_check, vfs_list_directory, vfs_resolve_path'
  - vfs_graph_stats returns nonzero total_edges, unique_files, unique_dependencies
    after discover
  - vfs_get_metadata with valid path returns xattrs; nonexistent path returns error
  - vfs_graph_impact with max_depth returns transitive dependents
  - vfs_rule_check('stale-files') returns results or structured error if no manifest
  - vfs_list_directory returns virtual directory entries with name, type, backend,
    size
  - vfs_resolve_path returns real_path, backend, cached, sync_status
