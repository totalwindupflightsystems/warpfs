guards:
  secrets: true
  lint: false
  tests: true
  test_mode: full
  test_command: cargo test
  static_analysis: false
evaluator:
  max_iterations: 50
  max_time: 10m
  max_input_tokens: '-1'
  max_output_tokens: 0.5M
  tool_call_weight: 0.1
defaults:
  model: deepseek-v4-flash
  check_for_updates: true
history:
  enabled: true
  storage: git
  max_verdicts: 1000
