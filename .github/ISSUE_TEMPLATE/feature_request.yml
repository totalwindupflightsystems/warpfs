name: Feature Request
description: Suggest a feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! What would make WarpFS more useful?
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would it work? CLI, MCP, or FUSE?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CLI
        - MCP server
        - FUSE mount
        - Graph engine
        - Backend storage
        - Plugin system
        - Multiple
